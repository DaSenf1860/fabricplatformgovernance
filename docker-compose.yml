version: '3.8'

services:
  fabric-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabric-management-portal
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount templates and static files for development
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/debug/user"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fabric-network

  # Optional: Add a reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: fabric-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Add SSL certificates here if needed
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      fabric-portal:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fabric-network
    profiles:
      - production

networks:
  fabric-network:
    driver: bridge

# Optional: Add logging configuration
x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
